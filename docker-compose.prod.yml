services:
  mysql:
    image: mysql:8.4
    container_name: familycal-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familycal-backend
    environment:
      SERVER_PORT: 11115
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FAMILYCAL_JWT_SECRET: ${FAMILYCAL_JWT_SECRET}
      FAMILYCAL_BOOTSTRAP_ADMIN_USERNAME: ${FAMILYCAL_BOOTSTRAP_ADMIN_USERNAME}
      FAMILYCAL_BOOTSTRAP_ADMIN_PASSWORD: ${FAMILYCAL_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "11115:11115"
    depends_on:
      - mysql
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: familycal-frontend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
