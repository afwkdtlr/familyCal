server:
  port: ${SERVER_PORT:11115}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/familycal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:familycal}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

familycal:
  jwt:
    secret: ${FAMILYCAL_JWT_SECRET:please-replace-with-a-long-random-secret-at-least-32-characters}
    expiration-ms: ${FAMILYCAL_JWT_EXPIRATION_MS:86400000}
  bootstrap:
    admin-username: ${FAMILYCAL_BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-password: ${FAMILYCAL_BOOTSTRAP_ADMIN_PASSWORD:1234}
